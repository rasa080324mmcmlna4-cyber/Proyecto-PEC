{% extends "base.html" %}

{% block content %}

<h1>Residuos</h1>

<form action="/guardar_residuo" method="POST">
    <input type="text" name="tipo" placeholder="Tipo">
    <input type="text" name="cantidad" placeholder="Cantidad">
    <button type="submit">Guardar</button>
</form>

<hr>

{% for r in residuos %}
<div class="card">
    <h3>{{ r.tipo }}</h3>
    <p>{{ r.cantidad }}</p>
</div>
{% endfor %}

{% endblock %}
