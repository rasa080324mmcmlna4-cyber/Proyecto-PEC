
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login PEC</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0b1020,#2a1b5a);
    color:white;
}

.login-box{
    width:420px;
    background:rgba(20,26,51,0.95);
    border:1px solid #6d28d9;
    border-radius:25px;
    padding:40px;
    text-align:center;
    box-shadow:0 0 30px rgba(139,92,246,.4);
}

.logo{
    font-size:60px;
    margin-bottom:10px;
}

h1{
    color:#8bff66;
    margin-bottom:10px;
}

.subtitulo{
    color:#d1d5db;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#1f2547;
    color:white;
    font-size:15px;
}

input:focus{
    outline:none;
    border:2px solid #8b5cf6;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#65d84f;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#4fc73b;
    transform:scale(1.03);
}

.error{
    margin-top:15px;
    color:#ff6b6b;
    font-weight:bold;
}

.footer{
    margin-top:25px;
    color:#9ca3af;
    font-size:14px;
}

</style>
</head>

<body>

<div class="login-box">

    <div class="logo">♻</div>

    <h1>PEC</h1>

    <p class="subtitulo">
        Sistema de Gestión Ambiental
    </p>

    <form method="POST">

        <input
            type="text"
            name="clave"
            placeholder="👤 Usuario"
            required>

        <input
            type="password"
            name="password"
            placeholder="🔒 Contraseña"
            required>

        <button type="submit">
            Ingresar
        </button>

    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <div class="footer">
        PEC
    </div>

</div>

</body>
</html>
