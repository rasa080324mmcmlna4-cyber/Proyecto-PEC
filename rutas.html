{% extends "base.html" %}

{% block content %}

<h1>Rutas</h1>

<form action="/guardar_ruta" method="POST">

    <input type="text" name="nombre" placeholder="Nombre">
    <input type="text" name="origen" placeholder="Origen">
    <input type="text" name="destino" placeholder="Destino">

    <button type="submit">Guardar</button>

</form>

<hr>

{% for r in rutas %}

<div class="card">

    <h3>{{ r.nombre }}</h3>
    <p>{{ r.origen }}</p>
    <p>{{ r.destino }}</p>

    <a href="/editar_ruta/{{ loop.index0 }}">
        <button style="background:orange;color:white;">Editar</button>
    </a>

    <a href="/eliminar_ruta/{{ loop.index0 }}">
        <button style="background:red;color:white;">Eliminar</button>
    </a>

</div>

{% endfor %}

{% endblock %}
